<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOR Copilot - Query Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: 600;
            text-align: center;
        }

        .status.loading {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status.success {
            background: #e8f5e9;
            color: #388e3c;
        }

        .status.error {
            background: #ffebee;
            color: #d32f2f;
        }

        .response-container {
            display: none;
        }

        .response-container.active {
            display: block;
        }

        .response-section {
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            border-radius: 4px;
        }

        .response-section h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .response-section p,
        .response-section ul {
            color: #555;
            line-height: 1.6;
        }

        .response-section ul {
            margin-left: 20px;
        }

        .response-section li {
            margin-bottom: 8px;
        }

        .doc-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .metadata {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
        }

        .metadata-item {
            background: white;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            border: 1px solid #ddd;
        }

        .metadata-item strong {
            display: block;
            color: #667eea;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .metadata-item span {
            color: #555;
            font-size: 1.1em;
        }

        .example-queries {
            margin-top: 20px;
        }

        .example-queries h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1em;
        }

        .example-btn {
            display: block;
            width: 100%;
            background: #f5f5f5;
            color: #555;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95em;
        }

        .example-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🎯 EOR Copilot</h1>
            <p>Employment & Operations Compliance - Ask your HR/Employment law questions</p>
        </div>

        <div class="main-content">
            <!-- Input Panel -->
            <div class="card">
                <h2>📝 Ask a Question</h2>

                <div class="input-group">
                    <label for="question">Your Question:</label>
                    <textarea id="question" placeholder="e.g., What is the notice period in Germany?"
                        autocomplete="off"></textarea>
                </div>

                <button onclick="submitQuery()" id="submitBtn">
                    Send Query
                </button>

                <div class="example-queries">
                    <h3>💡 Example Queries:</h3>
                    <button class="example-btn"
                        onclick="setExample('What are the onboarding requirements for a new hire in Poland?')">
                        📍 Polish Onboarding
                    </button>
                    <button class="example-btn" onclick="setExample('Can I terminate during probation in Germany?')">
                        🇩🇪 German Probation
                    </button>
                    <button class="example-btn"
                        onclick="setExample('What is the notice period in France for an employee with 2 years tenure?')">
                        🇫🇷 French Notice Period
                    </button>
                    <button class="example-btn"
                        onclick="setExample('Can we terminate a pregnant employee in Germany?')">
                        ⚠️ Pregnancy Protection
                    </button>
                    <button class="example-btn"
                        onclick="setExample('An employee is being transferred from Germany to Austria. What notice period applies?')">
                        🌍 Multi-Country Transfer
                    </button>
                </div>
            </div>

            <!-- Response Panel -->
            <div class="card">
                <h2>📚 Response</h2>
                <div id="statusMessage" class="status" style="display: none;"></div>
                <div id="responseContainer" class="response-container">
                    <div id="responseContent"></div>
                </div>
                <div id="placeholderText" style="text-align: center; color: #999; padding: 40px 0;">
                    💬 Your response will appear here...
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:5000';

        // Set example query
        function setExample(text) {
            document.getElementById('question').value = text;
            document.getElementById('question').focus();
        }

        // Submit query
        async function submitQuery() {
            const question = document.getElementById('question').value.trim();

            if (!question) {
                showStatus('Please enter a question', 'error');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span>Processing...';

            try {
                showStatus('🔄 Processing your query...', 'loading');

                const response = await fetch(`${API_URL}/query`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ question: question })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Query failed');
                }

                const data = await response.json();
                displayResponse(data);
                showStatus('✅ Query processed successfully', 'success');

            } catch (error) {
                console.error('Error:', error);
                showStatus(`❌ Error: ${error.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Send Query';
            }
        }

        // Display response
        function displayResponse(data) {
            const placeholder = document.getElementById('placeholderText');
            const container = document.getElementById('responseContainer');
            const content = document.getElementById('responseContent');

            let html = '';

            // Supervisor output
            const supervisorOutput = data.supervisor_output;
            if (supervisorOutput && supervisorOutput.follow_up_questions && supervisorOutput.follow_up_questions.length > 0) {
                html += `
                    <div class="response-section">
                        <h3>🤔 Missing Information</h3>
                        <p>Please provide additional details:</p>
                        <ul>
                            ${supervisorOutput.follow_up_questions.map(q => `<li>${q}</li>`).join('')}
                        </ul>
                    </div>
                `;
            } else {
                // Retrieved documents
                if (data.retrieved_documents && data.retrieved_documents.length > 0) {
                    html += `
                        <div class="response-section">
                            <h3>📋 Retrieved Documents</h3>
                            ${data.retrieved_documents.map(doc => `
                                <div>
                                    <span class="doc-badge">${doc.country}</span>
                                    <span class="doc-badge">${doc.doc_id}</span>
                                    <p style="margin-top: 8px; font-size: 0.95em;">${doc.snippet}</p>
                                </div>
                            `).join('<br>')}
                        </div>
                    `;
                }

                // Draft response
                if (data.draft_response && data.draft_response !== 'INSUFFICIENT_DATA') {
                    html += `
                        <div class="response-section">
                            <h3>📝 Initial Response</h3>
                            <p>${data.draft_response}</p>
                        </div>
                    `;
                }

                // Final response
                if (data.final_response) {
                    const finalResp = data.final_response;
                    html += `
                        <div class="response-section">
                            <h3>✅ Final Response</h3>
                            <p>${finalResp.final_response || 'No detailed response'}</p>
                            ${finalResp.confidence_level ? `
                                <div style="margin-top: 10px; padding: 10px; background: white; border-radius: 4px;">
                                    <strong>Confidence:</strong> ${finalResp.confidence_level}
                                </div>
                            ` : ''}
                            ${finalResp.escalation_recommendation ? `
                                <div style="margin-top: 10px; padding: 10px; background: #ffebee; border-radius: 4px; color: #d32f2f;">
                                    <strong>⚠️ Escalation:</strong> ${finalResp.escalation_recommendation}
                                </div>
                            ` : ''}
                        </div>
                    `;
                }

                // Metadata
                if (data.metadata) {
                    const meta = data.metadata;
                    html += `
                        <div class="metadata">
                            ${meta.country ? `<div class="metadata-item"><strong>Countries</strong><span>${Array.isArray(meta.country) ? meta.country.join(', ') : meta.country}</span></div>` : ''}
                            ${meta.doc_count ? `<div class="metadata-item"><strong>Documents</strong><span>${meta.doc_count}</span></div>` : ''}
                            ${meta.confidence ? `<div class="metadata-item"><strong>Confidence</strong><span>${meta.confidence}</span></div>` : ''}
                        </div>
                    `;
                }
            }

            content.innerHTML = html;
            placeholder.style.display = 'none';
            container.classList.add('active');
        }

        // Show status message
        function showStatus(message, type) {
            const status = document.getElementById('statusMessage');
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';

            if (type === 'success' || type === 'error') {
                setTimeout(() => {
                    status.style.display = 'none';
                }, 5000);
            }
        }

        // Allow Enter key to submit
        document.getElementById('question').addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey) {
                e.preventDefault();
                submitQuery();
            }
        });

        // Check if API is available
        window.addEventListener('load', async function () {
            try {
                const response = await fetch(`${API_URL}/health`);
                if (!response.ok) {
                    throw new Error('API not available');
                }
            } catch (error) {
                showStatus('⚠️ API Server not reachable. Make sure api_server.py is running', 'error');
            }
        });
    </script>
</body>

</html>
